<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title th:text="${product?.id != null} ? 'Edit Product — TechForge Admin' : 'Add Product — TechForge Admin'">
        Add Product — TechForge Admin
    </title>
    <link rel="stylesheet" th:href="@{/css/styles.css}"/>
</head>
<body>

<div class="admin-layout">

    <!-- ══════════ SIDEBAR ══════════ -->
    <aside class="admin-sidebar" id="sidebar">
        <div class="sidebar-brand">
            <div class="nav-logo-mark">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none"
                     stroke="currentColor" stroke-width="2.5">
                    <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/>
                </svg>
            </div>
            <span class="sidebar-brand-text">Tech<span>Forge</span></span>
            <span class="sidebar-admin-badge">Admin</span>
        </div>
        <nav class="sidebar-nav">
            <div class="sidebar-section-label">Overview</div>
            <a th:href="@{/admin/dashboard}" class="sidebar-nav-item">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/>
                    <rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/>
                </svg>Dashboard
            </a>
            <div class="sidebar-section-label">Catalogue</div>
            <a th:href="@{/admin/products}" class="sidebar-nav-item active">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/>
                    <line x1="3" y1="6" x2="21" y2="6"/>
                    <path d="M16 10a4 4 0 0 1-8 0"/>
                </svg>Products
            </a>
            <a th:href="@{/admin/categories}" class="sidebar-nav-item">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/>
                    <line x1="8" y1="18" x2="21" y2="18"/>
                </svg>Categories
            </a>
            <div class="sidebar-section-label">Sales</div>
            <a th:href="@{/admin/orders}" class="sidebar-nav-item">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
                    <polyline points="14 2 14 8 20 8"/>
                </svg>Orders
                <span class="sidebar-nav-badge">12</span>
            </a>
            <a th:href="@{/admin/payments}" class="sidebar-nav-item">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <rect x="1" y="4" width="22" height="16" rx="2" ry="2"/>
                    <line x1="1" y1="10" x2="23" y2="10"/>
                </svg>Payments
            </a>
            <div class="sidebar-section-label">System</div>
            <a th:href="@{/admin/settings}" class="sidebar-nav-item">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="12" cy="12" r="3"/>
                    <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
                </svg>Settings
            </a>
            <a th:href="@{/}" class="sidebar-nav-item">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
                    <polyline points="9 22 9 12 15 12 15 22"/>
                </svg>View Storefront
            </a>
        </nav>
        <div class="sidebar-footer">
            <div class="sidebar-user">
                <div class="sidebar-user-avatar">A</div>
                <div>
                    <div class="sidebar-user-name">Admin User</div>
                    <div class="sidebar-user-role">Super Administrator</div>
                </div>
            </div>
        </div>
    </aside>

    <!-- ══════════ MAIN ══════════ -->
    <div class="admin-main">
        <div class="admin-topbar">
      <span class="admin-topbar-title"
            th:text="${product?.id != null} ? 'Edit Product' : 'Add New Product'">
        Add New Product
      </span>
            <nav style="font-size:0.82rem;color:var(--white-dim);margin-left:8px;">
                /
                <a th:href="@{/admin}" style="color:var(--cyan);">Dashboard</a> /
                <a th:href="@{/admin/products}" style="color:var(--cyan);">Products</a> /
                <span th:text="${product?.id != null} ? 'Edit' : 'Add'">Add</span>
            </nav>
            <div class="admin-topbar-actions">
                <a th:href="@{/admin/products}" class="btn btn-ghost btn-sm">← Back to Products</a>
            </div>
        </div>

        <div class="admin-content">


            <form th:action="@{/admin/products}"
                  th:object="${product}"
                  method="post"
                  enctype="multipart/form-data">

                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

                <!-- NAME -->
                <div class="form-group">
                    <label>Product Name</label>
                    <input type="text"
                           th:field="*{name}"
                           class="form-input"
                           placeholder="Product name"/>
                    <span th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></span>
                </div>

                <!-- DESCRIPTION -->
                <div class="form-group">
                    <label>Description</label>
                    <textarea th:field="*{description}"
                              class="form-textarea"
                              rows="5"></textarea>
                    <span th:if="${#fields.hasErrors('description')}" th:errors="*{description}"></span>
                </div>

                <!-- CATEGORY -->
                <div class="form-group">
                    <label>Category</label>
                    <input type="text"
                           th:field="*{category}"
                           class="form-input"
                           placeholder="e.g. Laptops"/>
                    <span th:if="${#fields.hasErrors('category')}" th:errors="*{category}"></span>
                </div>

                <!-- PRICE -->
                <div class="form-group">
                    <label>Price</label>
                    <input type="number"
                           step="0.01"
                           th:field="*{price}"
                           class="form-input"/>
                    <span th:if="${#fields.hasErrors('price')}" th:errors="*{price}"></span>
                </div>

                <!-- QUANTITY -->
                <div class="form-group">
                    <label>Quantity</label>
                    <input type="number"
                           th:field="*{quantity}"
                           class="form-input"/>
                    <span th:if="${#fields.hasErrors('quantity')}" th:errors="*{quantity}"></span>
                </div>

                <!-- IMAGE URL LIST -->
                <div class="form-group">
                    <label>Image URLs (comma separated)</label>
                    <input type="text"
                           class="form-input"
                           placeholder="url1, url2, url3"
                           id="imageInput"/>
                </div>

                <!-- hidden field to bind List<String> -->
                <input type="hidden" th:field="*{imageUrl}" id="imageHidden"/>

                <!-- BUTTONS -->
                <button type="submit" class="btn btn-primary">
                    Save Product
                </button>

            </form>



        </div><!-- /.admin-content -->
    </div><!-- /.admin-main -->
</div><!-- /.admin-layout -->

<script>
    // Add spec row
    function addSpec() {
        const container = document.getElementById('specsContainer');
        const div = document.createElement('div');
        div.className = 'spec-row';
        div.style.cssText = 'display:grid;grid-template-columns:1fr 1fr auto;gap:10px;align-items:center;margin-bottom:10px;';
        div.innerHTML = `
      <input type="text" name="specKeys[]" class="form-input" placeholder="Spec name"/>
      <input type="text" name="specValues[]" class="form-input" placeholder="Value"/>
      <button type="button" class="btn-icon" onclick="removeSpec(this)">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
        </svg>
      </button>`;
        container.appendChild(div);
    }
    function removeSpec(btn) {
        btn.closest('.spec-row').remove();
    }

    // Image preview
    function previewImages(input) {
        const grid = document.getElementById('previewGrid');
        grid.innerHTML = '';
        grid.style.display = 'grid';
        Array.from(input.files).forEach(file => {
            const reader = new FileReader();
            reader.onload = e => {
                const div = document.createElement('div');
                div.className = 'image-preview-item';
                div.innerHTML = `<img src="${e.target.result}" alt="Preview"/>
          <button type="button" class="image-preview-remove"
                  onclick="this.parentElement.remove()">✕</button>`;
                grid.appendChild(div);
            };
            reader.readAsDataURL(file);
        });
    }

    function handleDrop(e) {
        e.preventDefault();
        const input = document.getElementById('imageUpload');
        input.files = e.dataTransfer.files;
        previewImages(input);
    }

    function removeImage(btn) {
        const id = btn.dataset.id;
        // TODO: POST /admin/products/images/{id}/delete
        btn.closest('.image-preview-item').remove();
    }

    // Character counters
    function updateCount(input, counterId) {
        const el = document.getElementById(counterId);
        if (el) el.textContent = input.value.length + '/' + input.maxLength;
    }

    // Auto-generate slug from name
    document.querySelector('input[name="name"]')?.addEventListener('input', function() {
        const slugField = document.querySelector('input[name="slug"]');
        if (slugField && !slugField.dataset.manual) {
            slugField.value = this.value
                .toLowerCase()
                .replace(/[^a-z0-9\s-]/g, '')
                .replace(/\s+/g, '-')
                .replace(/-+/g, '-');
        }
    });
    document.querySelector('input[name="slug"]')?.addEventListener('input', function() {
        this.dataset.manual = 'true';
    });
</script>
</body>
</html>
